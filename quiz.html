</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="logo">GEM<span>1</span> Study Platform <span>May 15 Exam Prep</span></div>
    <a href="index.html" class="btn btn-outline btn-sm">← Dashboard</a>

  <nav class="sidebar">

<script src="js/quiz.js"></script>
<script>
  // Allow ?topic= URL param to pre-filter
  const urlTopic = new URLSearchParams(location.search).get('topic');
  if (urlTopic) {
    document.addEventListener('DOMContentLoaded', () => {
      const btn = [...document.querySelectorAll('.cat-btn')].find(b => b.textContent === urlTopic);
      if (btn) btn.click();
    });
  }
</script>
</body>
